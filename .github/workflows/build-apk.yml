name: Compilar APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Configurar Android SDK
      run: |
        sudo apt-get update
        sudo apt-get install -y android-sdk
    
    - name: Compilar APK Debug con Gradle Wrapper
      run: |
        chmod +x ./gradlew
        ./gradlew --version
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
    
    - name: Subir APK como artefacto
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: APK-Debug
        path: app/build/outputs/apk/debug/app-debug.apk
    
    - name: Subir logs de compilación
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: build.log
